<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f8fafc" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>合同生成助手</title>
    <link rel="stylesheet" href="/static/app.css" />
    <script src="https://g.alicdn.com/dingding/dingtalk-jsapi/3.0.41/dingtalk.open.js"></script>
    <script>
      window.__AGENT_ENDPOINT__ = "";
      window.__DINGTALK_CORP_ID__ = {{ dingtalk_corp_id_json }};
    </script>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">钉钉 H5 微应用</p>
        <h1>合同生成助手</h1>
        <p>选择合同模板，上传报价单，先确认解析文本，再生成合同并返回下载链接。</p>
      </section>

      <section id="userBar" class="card user-bar" hidden>
        <div class="user-bar-content">
          <img id="userAvatar" class="user-avatar" alt="用户头像" width="48" height="48" hidden />
          <div class="user-meta">
            <p id="userName" class="user-name">—</p>
            <p id="userDept" class="user-detail">部门：—</p>
            <p id="userMobile" class="user-detail">手机：—</p>
            <p id="userTitle" class="user-detail">职位：—</p>
            <p id="loginHint" class="hint login-hint"></p>
          </div>
        </div>
      </section>

      <section class="card">
        <label>
          合同模板
          <select id="templateType">
            {% for option in templates %}
              <option value="{{ option.type }}">{{ option.displayName }}</option>
            {% endfor %}
          </select>
        </label>

        <label>
          报价单文件
          <input id="quoteFile" type="file" accept=".pdf,.xls,.xlsx,.txt" />
        </label>

        <button id="parseButton" type="button" disabled>上传并解析报价单</button>
        <p id="status" class="status" aria-live="polite">等待上传报价单。</p>
      </section>

      <section id="previewCard" class="card" hidden>
        <div>
          <p class="eyebrow">报价单解析文本</p>
          <h2>确认后生成合同</h2>
          <p class="hint">请检查下方文本，必要时可直接修正，再点击确认生成合同。</p>
        </div>
        <label>
          解析内容
          <textarea id="quoteTextPreview" rows="12"></textarea>
        </label>
        <button id="generateButton" type="button" disabled>确认文本并生成合同</button>
      </section>

      <section class="card log-card">
        <h2>处理进度</h2>
        <pre id="log"></pre>
        <a id="downloadLink" class="download" href="#" hidden>下载合同</a>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
