name: Deploy to FC

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            agent/requirements.txt
            agent/requirements-dev.txt

      - name: Install Python dependencies
        run: python3 -m pip install -r agent/requirements-dev.txt

      - name: Python syntax check
        run: python3 -m compileall agent

      - name: Run tests
        run: python3 -m pytest agent/tests

      - name: Build Agent Python wheelhouse
        run: |
          rm -rf agent/wheelhouse
          docker run --rm \
            -v "$PWD":/io \
            -w /io \
            quay.io/pypa/manylinux2014_x86_64 \
            /opt/python/cp312-cp312/bin/python -m pip wheel \
              --wheel-dir agent/wheelhouse \
              -r agent/requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install H5 frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build H5 frontend
        working-directory: frontend
        run: npm run build

      - name: Node syntax check
        run: node --check frontend/dist/app.js

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      ALIYUN_ACCOUNT_ID: ${{ secrets.ALIYUN_ACCOUNT_ID }}
      ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
      ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
      DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
      DASHSCOPE_MODEL: ${{ secrets.DASHSCOPE_MODEL }}
      DASHSCOPE_FALLBACK_MODELS: ${{ secrets.DASHSCOPE_FALLBACK_MODELS }}
      DINGTALK_CLIENT_ID: ${{ secrets.DINGTALK_CLIENT_ID }}
      DINGTALK_CLIENT_SECRET: ${{ secrets.DINGTALK_CLIENT_SECRET }}
      DINGTALK_CORP_ID: ${{ secrets.DINGTALK_CORP_ID }}
      DINGTALK_DRIVE_SPACE_ID: ${{ secrets.DINGTALK_DRIVE_SPACE_ID }}
      DINGTALK_DRIVE_PARENT_ID: ${{ secrets.DINGTALK_DRIVE_PARENT_ID }}
      DINGTALK_DRIVE_CONFLICT_POLICY: ${{ secrets.DINGTALK_DRIVE_CONFLICT_POLICY }}
      YONBIP_APP_KEY: ${{ secrets.YONBIP_APP_KEY }}
      YONBIP_APP_SECRET: ${{ secrets.YONBIP_APP_SECRET }}
      YONBIP_GATEWAY_URL: ${{ secrets.YONBIP_GATEWAY_URL }}
      YONBIP_TOKEN_URL: ${{ secrets.YONBIP_TOKEN_URL }}
      YONBIP_TENANT_ID: ${{ secrets.YONBIP_TENANT_ID }}
      APP_SESSION_SECRET: ${{ secrets.APP_SESSION_SECRET }}
      AGENT_ALLOWED_ORIGINS: ${{ secrets.AGENT_ALLOWED_ORIGINS }}
    concurrency:
      group: fc-deploy
      cancel-in-progress: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: agent/requirements.txt

      - name: Install Serverless Devs
        run: npm install -g @serverless-devs/s

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install H5 frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build H5 frontend
        working-directory: frontend
        run: npm run build

      - name: Build Agent Python wheelhouse
        run: |
          rm -rf agent/wheelhouse
          docker run --rm \
            -v "$PWD":/io \
            -w /io \
            quay.io/pypa/manylinux2014_x86_64 \
            /opt/python/cp312-cp312/bin/python -m pip wheel \
              --wheel-dir agent/wheelhouse \
              -r agent/requirements.txt

      - name: Configure Aliyun credentials
        run: |
          s config add \
            -a default \
            --AccountID ${{ secrets.ALIYUN_ACCOUNT_ID }} \
            --AccessKeyID ${{ secrets.ALIYUN_ACCESS_KEY_ID }} \
            --AccessKeySecret ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }} \
            -f

      - name: Verify required secrets for deploy
        run: |
          set -euo pipefail
          missing=""
          for var in ALIYUN_ACCOUNT_ID ALIYUN_ACCESS_KEY_ID ALIYUN_ACCESS_KEY_SECRET \
            DASHSCOPE_API_KEY DASHSCOPE_MODEL \
            DINGTALK_CLIENT_ID DINGTALK_CLIENT_SECRET DINGTALK_CORP_ID \
            DINGTALK_DRIVE_SPACE_ID DINGTALK_DRIVE_PARENT_ID \
            YONBIP_APP_KEY YONBIP_APP_SECRET \
            APP_SESSION_SECRET; do
            val="$(printenv "$var" || true)"
            if [ -z "$val" ]; then
              missing="$missing $var"
            fi
          done
          if [ -n "${missing# }" ]; then
            echo "::error::缺少或未配置的环境变量（GitHub Secrets）：${missing# }"
            echo "请对照 s.yaml 中 environmentVariables 的 env(...) 项补齐后再部署。"
            exit 1
          fi

      - name: Deploy to FC
        run: s deploy -t s.yaml --assume-yes

      - name: Get FC URL
        id: get-url
        run: |
          s info -t s.yaml
          URLS="$(s info -t s.yaml 2>/dev/null | grep -Eo 'https?://[^[:space:]]+' || true)"
          APP_URL=$(echo "$URLS" | tail -1)
          echo "app_url=$APP_URL" >> "$GITHUB_OUTPUT"
          if [ -n "$APP_URL" ]; then
            echo "FC URL: $APP_URL"
          else
            echo "::notice::未能从 s info 输出中解析 FC URL，部署已完成，请在函数计算控制台查看自定义域名或函数 HTTP 触发地址。"
          fi

      - name: H5 page check
        if: steps.get-url.outputs.app_url != ''
        run: |
          APP_URL="${{ steps.get-url.outputs.app_url }}"
          PAGE="$(curl --fail-with-body --connect-timeout 10 --max-time 60 "$APP_URL")"
          echo "$PAGE" | grep "合同生成助手"
          echo "$PAGE" | grep "上传报价单 → 补充信息 → 确认字段 → 生成合同"
          echo "$PAGE" | grep "accessModal"

      - name: FC health check
        if: steps.get-url.outputs.app_url != ''
        run: |
          sleep 30
          APP_URL="${{ steps.get-url.outputs.app_url }}"
          curl --fail-with-body --connect-timeout 10 --max-time 60 --retry 2 --retry-delay 10 --retry-all-errors "${APP_URL}/health"

      - name: Dump FC logs on failure
        if: failure()
        run: |
          s info -t s.yaml || true
          s logs -t s.yaml --type fail || true
          s logs -t s.yaml --tail 100 || true
