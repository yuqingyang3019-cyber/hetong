name: Deploy to AgentRun

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: agent/requirements.txt

      - name: Install Python dependencies
        run: python3 -m pip install -r agent/requirements.txt

      - name: Run tests
        run: python3 -m pytest agent/tests

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build H5 frontend
        working-directory: frontend
        run: npm run build

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      ALIYUN_ACCOUNT_ID: ${{ secrets.ALIYUN_ACCOUNT_ID }}
      ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
      ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
      DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
      DASHSCOPE_MODEL: ${{ secrets.DASHSCOPE_MODEL }}
      DINGTALK_CLIENT_ID: ${{ secrets.DINGTALK_CLIENT_ID }}
      DINGTALK_CLIENT_SECRET: ${{ secrets.DINGTALK_CLIENT_SECRET }}
      DINGTALK_CORP_ID: ${{ secrets.DINGTALK_CORP_ID }}
      DINGTALK_DRIVE_SPACE_ID: ${{ secrets.DINGTALK_DRIVE_SPACE_ID }}
      DINGTALK_DRIVE_PARENT_ID: ${{ secrets.DINGTALK_DRIVE_PARENT_ID }}
      DINGTALK_DRIVE_CONFLICT_POLICY: ${{ secrets.DINGTALK_DRIVE_CONFLICT_POLICY }}
      APP_SESSION_SECRET: ${{ secrets.APP_SESSION_SECRET }}
      AGENT_ALLOWED_ORIGINS: ${{ secrets.AGENT_ALLOWED_ORIGINS }}
    concurrency:
      group: agentrun-deploy
      cancel-in-progress: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: agent/requirements.txt

      - name: Install Serverless Devs
        run: npm install -g @serverless-devs/s

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install H5 frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build H5 frontend
        working-directory: frontend
        run: npm run build

      - name: Vendor H5 Node dependencies
        working-directory: frontend/dist
        run: npm ci --omit=dev --ignore-scripts

      - name: Configure Aliyun credentials
        run: |
          s config add \
            -a default \
            --AccountID ${{ secrets.ALIYUN_ACCOUNT_ID }} \
            --AccessKeyID ${{ secrets.ALIYUN_ACCESS_KEY_ID }} \
            --AccessKeySecret ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }} \
            -f

      - name: Verify required secrets for deploy
        run: |
          set -euo pipefail
          missing=""
          for var in ALIYUN_ACCOUNT_ID ALIYUN_ACCESS_KEY_ID ALIYUN_ACCESS_KEY_SECRET \
            DASHSCOPE_API_KEY DASHSCOPE_MODEL \
            DINGTALK_CLIENT_ID DINGTALK_CLIENT_SECRET DINGTALK_CORP_ID \
            DINGTALK_DRIVE_SPACE_ID DINGTALK_DRIVE_PARENT_ID \
            APP_SESSION_SECRET AGENT_ALLOWED_ORIGINS; do
            val="$(printenv "$var" || true)"
            if [ -z "$val" ]; then
              missing="$missing $var"
            fi
          done
          if [ -n "${missing# }" ]; then
            echo "::error::缺少或未配置的环境变量（GitHub Secrets）：${missing# }"
            echo "请对照 s.yaml 中 environmentVariables 的 env(...) 项补齐后再部署。"
            exit 1
          fi

      - name: Deploy to AgentRun
        run: s deploy -t s.yaml --assume-yes

      - name: Get endpoint URL
        id: get-url
        run: |
          s info -t s.yaml
          URLS=$(s info -t s.yaml 2>/dev/null | grep -Eo 'https?://[^[:space:]]+')
          ENDPOINT_URL=$(echo "$URLS" | grep 'agentrun-data' | head -1)
          H5_URL=$(echo "$URLS" | grep -v 'agentrun-data' | tail -1)
          echo "endpoint_url=$ENDPOINT_URL" >> "$GITHUB_OUTPUT"
          echo "h5_url=$H5_URL" >> "$GITHUB_OUTPUT"
          echo "Endpoint URL: $ENDPOINT_URL"
          echo "H5 URL: $H5_URL"

      - name: H5 page check
        if: steps.get-url.outputs.h5_url != ''
        run: |
          H5_URL="${{ steps.get-url.outputs.h5_url }}"
          PAGE="$(curl --fail-with-body --connect-timeout 10 --max-time 60 "$H5_URL")"
          echo "$PAGE" | grep "合同生成助手"
          echo "$PAGE" | grep "上传报价单 → 补充信息 → 确认字段 → 生成合同"
          echo "$PAGE" | grep "accessModal"

      - name: AGUI protocol check
        if: steps.get-url.outputs.endpoint_url != ''
        run: |
          sleep 30
          ENDPOINT_URL="${{ steps.get-url.outputs.endpoint_url }}"
          curl --fail-with-body --connect-timeout 10 --max-time 120 --retry 2 --retry-delay 10 --retry-all-errors -N "${ENDPOINT_URL}/ag-ui/agent" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "Accept: text/event-stream" \
            -d '{"threadId":"ci-thread","runId":"ci-run","state":{},"messages":[{"id":"ci-msg","role":"user","content":"健康检查"}],"tools":[],"context":[],"forwardedProps":{"healthCheck":true}}'

      - name: Dump AgentRun logs on failure
        if: failure()
        run: |
          s info -t s.yaml || true
          s logs -t s.yaml --type fail || true
          s logs -t s.yaml --tail 100 || true
