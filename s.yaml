edition: 3.0.0
name: hetong-agui
access: default

vars:
  region: cn-hangzhou
  function_name: hetong-agui

resources:
  app:
    component: fc3
    props:
      region: ${vars.region}
      functionName: ${vars.function_name}
      description: 合同生成助手 H5 与业务 API
      runtime: custom.debian11
      code: ./agent
      customRuntimeConfig:
        command:
          - /bin/bash
          - bootstrap.sh
        port: 9000
      cpu: 0.5
      memorySize: 1024
      diskSize: 512
      timeout: 300
      instanceConcurrency: 10
      internetAccess: true
      environmentVariables:
        PORT: "9000"
        H5_STATIC_DIR: /code/static
        PATH: /var/fc/lang/python3.12/bin:/usr/local/bin:/usr/bin:/bin
        PYTHONPATH: /code:/code/python:/opt/python
        DASHSCOPE_API_KEY: ${env("DASHSCOPE_API_KEY")}
        DASHSCOPE_BASE_URL: https://dashscope.aliyuncs.com/compatible-mode/v1
        DASHSCOPE_MODEL: ${env("DASHSCOPE_MODEL")}
        DASHSCOPE_FALLBACK_MODELS: ${env("DASHSCOPE_FALLBACK_MODELS", "")}
        DASHSCOPE_ENABLE_THINKING: ${env("DASHSCOPE_ENABLE_THINKING", "false")}
        DASHSCOPE_TIMEOUT_SECONDS: ${env("DASHSCOPE_TIMEOUT_SECONDS", "180")}
        ALIYUN_ACCESS_KEY_ID: ${env("ALIYUN_ACCESS_KEY_ID")}
        ALIYUN_ACCESS_KEY_SECRET: ${env("ALIYUN_ACCESS_KEY_SECRET")}
        ALIYUN_OCR_ENDPOINT: ocr-api.cn-hangzhou.aliyuncs.com
        ALIYUN_OCR_REGION_ID: cn-hangzhou
        ALIYUN_OCR_SCENE: Advanced
        ALIYUN_OCR_OUTPUT_TABLE: "true"
        ALIYUN_OCR_LINELESS_TABLE: "false"
        DINGTALK_CLIENT_ID: ${env("DINGTALK_CLIENT_ID")}
        DINGTALK_CLIENT_SECRET: ${env("DINGTALK_CLIENT_SECRET")}
        DINGTALK_CORP_ID: ${env("DINGTALK_CORP_ID")}
        DINGTALK_DRIVE_SPACE_ID: ${env("DINGTALK_DRIVE_SPACE_ID")}
        DINGTALK_DRIVE_PARENT_ID: ${env("DINGTALK_DRIVE_PARENT_ID")}
        DINGTALK_DRIVE_CONFLICT_POLICY: ${env("DINGTALK_DRIVE_CONFLICT_POLICY", "AUTO_RENAME")}
        YONBIP_APP_KEY: ${env("YONBIP_APP_KEY", "")}
        YONBIP_APP_SECRET: ${env("YONBIP_APP_SECRET", "")}
        YONBIP_GATEWAY_URL: ${env("YONBIP_GATEWAY_URL", "https://c3.yonyoucloud.com/iuap-api-gateway")}
        YONBIP_TOKEN_URL: ${env("YONBIP_TOKEN_URL", "https://c3.yonyoucloud.com/iuap-api-gateway")}
        YONBIP_TENANT_ID: ${env("YONBIP_TENANT_ID", "")}
        YONBIP_ORG_ID: ${env("YONBIP_ORG_ID", "")}
        YONBIP_VENDOR_PAGE_SIZE: ${env("YONBIP_VENDOR_PAGE_SIZE", "500")}
        APP_SESSION_SECRET: ${env("APP_SESSION_SECRET")}
        AGENT_ALLOWED_ORIGINS: ${env("AGENT_ALLOWED_ORIGINS", "")}
        AGENT_ALLOWED_ORIGIN_REGEX: ${env("AGENT_ALLOWED_ORIGIN_REGEX", "")}
        AGENT_TOKEN_TTL_SEC: "1800"
      customDomain:
        protocol: HTTP
        route:
          path: '/*'
          qualifier: LATEST
        domainName: auto
