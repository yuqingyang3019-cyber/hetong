edition: 3.0.0
name: hetong-agui
access: default

vars:
  region: cn-hangzhou
  agent_name: hetong-agui
  role: acs:ram::${env("ALIYUN_ACCOUNT_ID")}:role/AliyunAgentRunFunAgentRole

resources:
  agent:
    component: agentrun
    props:
      region: ${vars.region}
      agent:
        name: ${vars.agent_name}
        description: 合同生成 Agent H5 一体化应用
        role: ${vars.role}
        code:
          src: ./agent
          language: python3.12
          command:
            - sh
            - bootstrap.sh
        cpu: 1.0
        memory: 2048
        port: 9000
        instanceConcurrency: 20
        internetAccess: true
        environmentVariables:
          PORT: "9000"
          PYTHONPATH: /code:/code/python:/opt/python
          DASHSCOPE_API_KEY: ${env("DASHSCOPE_API_KEY")}
          DASHSCOPE_BASE_URL: https://dashscope.aliyuncs.com/compatible-mode/v1
          DASHSCOPE_MODEL: ${env("DASHSCOPE_MODEL")}
          DASHSCOPE_ENABLE_THINKING: "true"
          ALIYUN_ACCESS_KEY_ID: ${env("ALIYUN_ACCESS_KEY_ID")}
          ALIYUN_ACCESS_KEY_SECRET: ${env("ALIYUN_ACCESS_KEY_SECRET")}
          ALIYUN_OCR_ENDPOINT: ocr-api.cn-hangzhou.aliyuncs.com
          ALIYUN_OCR_REGION_ID: cn-hangzhou
          ALIYUN_OCR_SCENE: Advanced
          ALIYUN_OCR_OUTPUT_TABLE: "true"
          ALIYUN_OCR_LINELESS_TABLE: "false"
          DINGTALK_APP_KEY: ${env("DINGTALK_APP_KEY")}
          DINGTALK_APP_SECRET: ${env("DINGTALK_APP_SECRET")}
          DINGTALK_CLIENT_ID: ${env("DINGTALK_APP_KEY")}
          DINGTALK_CLIENT_SECRET: ${env("DINGTALK_APP_SECRET")}
          DINGTALK_AGENT_ID: ${env("DINGTALK_AGENT_ID")}
          DINGTALK_CORP_ID: ${env("DINGTALK_CORP_ID")}
          APP_SESSION_SECRET: ${env("APP_SESSION_SECRET")}
          AGENT_ALLOWED_ORIGINS: ${env("AGENT_ALLOWED_ORIGINS")}
          AGENT_ALLOWED_ORIGIN_REGEX: ${env("AGENT_ALLOWED_ORIGIN_REGEX")}
        endpoints:
          - name: Default
            version: LATEST
            description: 默认入口

  h5-web:
    component: fc3
    props:
      region: ${vars.region}
      functionName: ${vars.agent_name}_h5_web
      description: 合同生成助手 H5 前端
      runtime: custom
      code: ./frontend/dist
      customRuntimeConfig:
        command:
          - /bin/bash
          - start.sh
        port: 8000
      cpu: 0.5
      memorySize: 512
      diskSize: 512
      timeout: 3600
      instanceConcurrency: 100
      internetAccess: true
      environmentVariables:
        PORT: "8000"
        AGENT_ENDPOINT: ${resources.agent.output.agent.endpoints.0.url}
        DINGTALK_CORP_ID: ${env("DINGTALK_CORP_ID")}
      customDomain:
        protocol: HTTP
        route:
          path: '/*'
          qualifier: LATEST
        domainName: auto
